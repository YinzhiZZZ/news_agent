name: Daily Digest

on:
  schedule:
    # 每天美东时间 10:00 AM（EDT = UTC-4 → UTC 14:00）
    - cron: '0 14 * * *'
  workflow_dispatch:  # 允许在 GitHub 页面手动触发

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run pipeline (fetch → scrape → summarize)
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: PYTHONIOENCODING=utf-8 python pipeline.py

      - name: Run publisher (generate HTML + send email)
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GMAIL_SENDER:      ${{ secrets.GMAIL_SENDER }}
          GMAIL_RECIPIENT:   ${{ secrets.GMAIL_RECIPIENT }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          GITHUB_PAGES_URL:  ${{ secrets.GITHUB_PAGES_URL }}
        run: PYTHONIOENCODING=utf-8 python publisher/send_digest.py

      - name: Commit docs/index.html back to repo
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/index.html
          # 只在文件有变化时才提交，避免空 commit
          git diff --cached --quiet || \
            git commit -m "chore: update daily digest $(date -u '+%Y-%m-%d')"
          git push
