name: Daily Digest

on:
  schedule:
    # 每天美东时间 10:00 AM（EDT = UTC-4 → UTC 14:00）
    - cron: '0 14 * * *'
  workflow_dispatch:  # 允许在 GitHub 页面手动触发

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Test Anthropic API connectivity
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          python -c "
          import os, anthropic
          key = os.environ.get('ANTHROPIC_API_KEY', 'MISSING')
          print(f'Key prefix: {key[:8]}...' if key != 'MISSING' else 'KEY MISSING')
          client = anthropic.Anthropic()
          try:
              r = client.messages.create(
                  model='claude-haiku-4-5-20251001',
                  max_tokens=10,
                  messages=[{'role':'user','content':'hi'}]
              )
              print('API OK:', r.content[0].text)
          except Exception as e:
              print(f'API FAILED ({type(e).__name__}): {e}')
              raise
          "

      - name: Run pipeline (fetch → scrape → summarize)
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          PYTHONIOENCODING=utf-8 python pipeline.py
          echo "=== output 目录内容 ==="
          ls -la output/ || echo "output 目录不存在"

      - name: Run publisher (generate HTML + send email)
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GMAIL_SENDER:      ${{ secrets.GMAIL_SENDER }}
          GMAIL_RECIPIENT:   ${{ secrets.GMAIL_RECIPIENT }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          PAGES_URL:         ${{ secrets.PAGES_URL }}
        run: PYTHONIOENCODING=utf-8 python publisher/send_digest.py

      - name: Commit docs/index.html back to repo
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/index.html
          # 只在文件有变化时才提交，避免空 commit
          git diff --cached --quiet || \
            git commit -m "chore: update daily digest $(date -u '+%Y-%m-%d')"
          git push
